<!DOCTYPE html>
<html>
<head>
    <title>Course Registration Form</title>
</head>
<body>
    <h2>Student Course Registration Form</h2>
    <form action="#" method="post">
        <!-- Personal Information -->
        <fieldset>
            <legend>Personal Information</legend>
            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" required><br><br>

            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob" required><br><br>

            <label for="gender">Gender:</label>
            <input type="radio" id="male" name="gender" value="Male"> Male
            <input type="radio" id="female" name="gender" value="Female"> Female
            <input type="radio" id="other" name="gender" value="Other"> Other<br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" required><br><br>

            <label for="address">Address:</label><br>
            <textarea id="address" name="address" rows="3" cols="40" required></textarea><br><br>
        </fieldset>

        <!-- Academic Information -->
        <fieldset>
            <legend>Academic Information</legend>
            <label for="studentid">Student ID:</label>
            <input type="text" id="studentid" name="studentid" required><br><br>

            <label for="course">Select Course:</label>
            <select id="course" name="course" required>
                <option value="">--Choose a Course--</option>
                <option value="java">Java Full Stack Development</option>
                <option value="python">Python Full Stack Development</option>
                <option value="aws">AWS Cloud Practitioner</option>
                <option value="sql">SQL & Database Management</option>
                <option value="web">Web Development (HTML, CSS, JS)</option>
            </select><br><br>

            <label for="duration">Course Duration:</label>
            <select id="duration" name="duration" required>
                <option value="">--Select Duration--</option>
                <option value="3months">3 Months</option>
                <option value="6months">6 Months</option>
                <option value="1year">1 Year</option>
            </select><br><br>
        </fieldset>

        <!-- Declaration -->
        <fieldset>
            <legend>Declaration</legend>
            <input type="checkbox" id="declare" name="declare" required>
            <label for="declare">I hereby declare that the information provided is true and correct.</label><br><br>
        </fieldset>

        <!-- Submit -->
        <input type="submit" value="Register">
        <input type="reset" value="Clear Form">
    </form>
</body>
</html>
