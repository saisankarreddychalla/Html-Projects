<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multimedia Blog</title>
</head>
<body>

    <header>
        <h1>My Multimedia Blog</h1>
        <p>Welcome to my blog with all multimedia elements!</p>
        <hr>
    </header>

    <nav>
        <a href="#images">Images</a> |
        <a href="#audio">Audio</a> |
        <a href="#video">Video</a> |
        <a href="#youtube">YouTube</a>
    </nav>

    <hr>
    <section id="images">
        <h2>Image Section</h2>

        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=600"
             alt="Nature Image"
             width="400">

        <figure>
            <img src="https://images.unsplash.com/photo-1511497584788-876760111969?w=400"
                 alt="Mountain"
                 width="300">
            <figcaption>Beautiful Mountain View</figcaption>
        </figure>
    </section>

    <hr>

    <section id="audio">
        <h2>Audio Section</h2>

        <audio controls>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
            Your browser does not support audio.
        </audio>
    </section>

    <hr>

    <section id="video">
        <h2>Video Section</h2>

        <video width="500" controls>
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            Your browser does not support video.
        </video>
    </section>

    <hr>

    <section id="youtube">
        <h2>YouTube Embed</h2>

        <iframe width="560" height="315"
                src="https://www.youtube.com/embed/tgbNymZ7vqY"
                allowfullscreen>
        </iframe>
    </section>

    <hr>

    <section>
        <h2>Useful Links</h2>
        <p>
            Visit 
            <a href="https://www.wikipedia.org" target="_blank">
                Wikipedia
            </a>
            for more learning.
        </p>
    </section>

    <footer>
        <hr>
        <p>© 2026 Multimedia Blog</p>
    </footer>

</body>
</html>
